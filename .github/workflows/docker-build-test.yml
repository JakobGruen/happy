name: Docker Build Test

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/happy-server/**'
      - 'Dockerfile.server'
      - '.github/workflows/docker-build-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/happy-server/**'
      - 'Dockerfile.server'
      - '.github/workflows/docker-build-test.yml'
  workflow_dispatch:

jobs:
  docker-build-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate package.json syntax
        run: |
          echo "Validating package.json files..."
          bun install --version > /dev/null 2>&1 || (curl -fsSL https://bun.sh/install | bash && export PATH=$HOME/.bun/bin:$PATH)
          
          for pkg in package.json packages/happy-server/package.json packages/happy-app/package.json packages/happy-cli/package.json packages/happy-wire/package.json; do
            if [ -f "$pkg" ]; then
              echo "  Checking $pkg..."
              if ! jq empty "$pkg" 2>/dev/null; then
                echo "  ❌ FAILED: Invalid JSON in $pkg"
                cat "$pkg" | jq . || true
                exit 1
              fi
              echo "  ✓ OK"
            fi
          done
          echo "All package.json files are valid!"
      
      - name: Build Docker image
        run: |
          docker build -f Dockerfile.server --progress=plain --tag happy-server:test .

      - name: Integration Test — Docker container
        if: success()
        run: |
          # Use the local test script to run integration tests
          # This ensures CI and local testing use identical test logic
          IMAGE_TAG="happy-server:test" bash scripts/test-docker-integration.sh --skip-build
