name: Docker Build Test

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/happy-server/**'
      - 'Dockerfile.server'
      - '.github/workflows/docker-build-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/happy-server/**'
      - 'Dockerfile.server'
      - '.github/workflows/docker-build-test.yml'
  workflow_dispatch:

jobs:
  docker-build-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate package.json syntax
        run: |
          echo "Validating package.json files..."
          bun install --version > /dev/null 2>&1 || (curl -fsSL https://bun.sh/install | bash && export PATH=$HOME/.bun/bin:$PATH)
          
          for pkg in package.json packages/happy-server/package.json packages/happy-app/package.json packages/happy-cli/package.json packages/happy-wire/package.json; do
            if [ -f "$pkg" ]; then
              echo "  Checking $pkg..."
              if ! jq empty "$pkg" 2>/dev/null; then
                echo "  ❌ FAILED: Invalid JSON in $pkg"
                cat "$pkg" | jq . || true
                exit 1
              fi
              echo "  ✓ OK"
            fi
          done
          echo "All package.json files are valid!"
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.server
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: happy-server:test
      
      - name: Test built image starts and serves
        if: success()
        run: |
          # Build the image with docker build (not just docker/build-push-action)
          docker build -f Dockerfile.server --progress=plain --tag happy-server:test .

          echo "Testing image startup and server functionality..."

          # Start the container in background with timeout
          CONTAINER_ID=$(docker run --rm -d \
            -e HANDY_MASTER_SECRET="test-secret-32-bytes-minimum" \
            -p 3005:3005 \
            happy-server:test)

          echo "Container started: $CONTAINER_ID"

          # Wait for server to be ready (max 30 seconds)
          ATTEMPTS=0
          MAX_ATTEMPTS=30
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            if curl -f http://localhost:3005/health 2>/dev/null | grep -q "ok"; then
              echo "Server is ready!"
              break
            fi
            ATTEMPTS=$((ATTEMPTS + 1))
            sleep 1
          done

          if [ $ATTEMPTS -eq $MAX_ATTEMPTS ]; then
            echo "Server failed to start within 30 seconds"
            docker logs $CONTAINER_ID
            docker kill $CONTAINER_ID
            exit 1
          fi

          # Test that server responds
          if curl -f http://localhost:3005/health > /dev/null 2>&1; then
            echo "Server responds to health checks"
          else
            echo "Server health check failed"
            docker logs $CONTAINER_ID
            docker kill $CONTAINER_ID
            exit 1
          fi

          docker kill $CONTAINER_ID
          echo "Image builds, starts, and serves successfully!"
